<div class="min-h-screen flex items-center justify-center bg-slate-100 px-4">
      <div class="w-full max-w-md bg-white rounded-2xl shadow p-8">
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Створення облікового запису</h1>
        <p class="text-slate-500 mb-6">Введіть логін для використання Query Optimizer.</p>

        <form (ngSubmit)="register()" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">
              Логін
            </label>
            <input
              [(ngModel)]="userName"
              name="userName"
              class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="admin"
              required
            />
          </div>

          <button
            type="submit"
            [disabled]="loading"
            class="w-full rounded-xl bg-blue-600 text-white py-3 font-medium hover:bg-blue-700 disabled:opacity-50">
            {{ loading ? 'Створення облікового запису...' : 'Зареєструватись' }}
          </button>
        </form>

        <p class="mt-5 text-sm text-slate-600">
          У Вас вже є обліковий запис?
          <a routerLink="/login" class="text-blue-600 font-medium">Ввійти</a>
        </p>

        <p *ngIf="error" class="mt-4 text-sm text-red-600">{{ error }}</p>
      </div>
    </div>
